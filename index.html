<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="Sistem Informasi Pengawasan Orang Asing - Direktorat Jenderal Imigrasi Kementerian Imigrasi dan Pemasyarakatan RI" />
    <meta name="keywords" content="Imigrasi, WNA, Orang Asing, SIPAGI, Pengawasan" />
    <meta name="author" content="Direktorat Jenderal Imigrasi" />
    <meta property="og:title" content="SIPAGI - Sistem Informasi Pengawasan Orang Asing" />
    <meta property="og:description" content="Platform pemantauan dan analisis terpadu orang asing untuk Kantor Imigrasi Kelas I TPI Jambi" />
    <meta property="og:image" content="/logo-imigrasi.png" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#001f3f" />
    <title>SIPAGI - Sistem Informasi Pengawasan Orang Asing | Ditjen Imigrasi</title>
    <style>
      #root {
        width: 100%;
        height: 100%;
      }
      /* Fixed height for map container */
      .map-container {
        min-height: 500px;
        width: 100%;
      }
      
      /* Custom loading screen with logo */
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #001f3f 0%, #000d1a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      .splash-logo {
        width: 120px;
        height: 120px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      .splash-text {
        margin-top: 24px;
        text-align: center;
      }
      
      .splash-title {
        font-size: 24px;
        font-weight: bold;
        color: #d4af37;
        letter-spacing: 4px;
        margin-bottom: 8px;
      }
      
      .splash-subtitle {
        font-size: 10px;
        color: rgba(255,255,255,0.6);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      
      .splash-loader {
        width: 40px;
        height: 40px;
        margin-top: 32px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #d4af37;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Hide splash screen when app is ready */
      .splash-screen.hide {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen dengan Logo Imigrasi -->
    <div id="splash" class="splash-screen">
      <img src="/logo.png" alt="Logo Direktorat Jenderal Imigrasi" class="splash-logo" />
      <div class="splash-text">
        <div class="splash-title">PANTAU ASING</div>
        <div class="splash-subtitle">Pemetaan dan Analisis Terpadu Orang Asing</div>
        <div class="splash-subtitle" style="margin-top: 8px;">Direktorat Jenderal Imigrasi</div>
      </div>
      <div class="splash-loader"></div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Hide splash screen setelah app siap
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(function() {
              splash.style.display = 'none';
            }, 500);
          }
        }, 800);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
